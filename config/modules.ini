# ============================================================
# MultimediaSDK 模块配置
# 修改此文件即可调整裁剪范围，无需改任何脚本
# ============================================================

[core]
gstreamer = true
gst-plugins-base = true

[plugins.good]
rtsp = true
rtp = true
isomp4 = true
soup = true
opus = false
vpx = false
jack = false
oss = false

[plugins.bad]
codecparsers = true
d3d11 = true
va = true
nvcodec = true
mpegts = false
webrtc = false
hls = false
dash = false

[plugins.ugly]
enabled = false

[libav]
enabled = true

[other]
gst-rtsp-server = false
gst-editing-services = false
gst-python = false
gst-devtools = false
gst-examples = false

[ffmpeg]
decoders = h264,hevc
demuxers = rtsp,mpegts,mp4
muxers = mp4
parsers = h264,hevc
encoders =
protocols = file,pipe,tcp,udp,rtp,rtsp
